# Mosquitto config — broker MQTT local pour HACCP

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice

# Listener MQTT principal (TCP 1883)
listener 1883
allow_anonymous true

# Listener WebSocket pour le frontend Z2M (optionnel mais pratique pour debug)
listener 9001
protocol websockets
allow_anonymous true
